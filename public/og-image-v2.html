<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
  
  @font-face {
    font-family: 'Civane';
    src: url('../src/app/fonts/Civane-Norm-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  body { 
    width: 1200px; 
    height: 630px; 
    overflow: hidden;
    background: #FBF3EC;
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    padding: 90px 110px;
    position: relative;
  }

  .left { 
    max-width: 530px; 
    display: flex;
    flex-direction: column;
    z-index: 5;
    height: 100%;
    justify-content: space-between;
  }
  
  .brand-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .logo-img {
    width: 40px;
    height: 40px;
    object-fit: contain;
  }
  
  .logo-text { 
    font-family: 'Civane', 'Plus Jakarta Sans', sans-serif;
    font-size: 28px; 
    font-weight: normal; 
    color: #241B14; 
    letter-spacing: -0.02em;
  }
  
  .logo-text span { 
    color: #E8593C; 
  }
  
  .main-text {
    margin-top: auto;
    margin-bottom: auto;
  }
  
  h1 { 
    font-family: 'Civane', 'Plus Jakarta Sans', sans-serif;
    font-size: 56px; 
    font-weight: normal; 
    color: #1C1513; 
    line-height: 1.1; 
    letter-spacing: -0.02em; 
    margin-bottom: 24px; 
  }
  
  h1 span { 
    color: #E8593C; 
  }
  
  p { 
    font-size: 20px; 
    color: rgba(36, 27, 20, 0.55); 
    line-height: 1.55; 
    font-weight: 500;
  }

  .url { 
    font-size: 15px; 
    color: #E8593C; 
    font-weight: 700; 
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: auto;
  }
  
  .url::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E8593C;
  }

  /* Mascot scaled to 560x560px and shifted slightly upward (bottom: 10px) */
  .illustration-container { 
    position: absolute;
    right: -70px;
    bottom: 10px;
    width: 560px;
    height: 560px;
    z-index: 2;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
  }
  
  .hero-illustration {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom right;
    mix-blend-mode: multiply;
    transform: scaleX(-1);
  }
</style>
</head>
<body>
  <div class="left">
    <div class="brand-header">
      <img class="logo-img" src="auren_logo.webp" alt="Auren Logo">
      <div class="logo-text">Auren<span>.</span></div>
    </div>
    
    <div class="main-text">
      <h1>The execution layer<br>between thinking<br>and <span>doing.</span></h1>
      <p>A single text command to execute actions across GitHub, Calendar, and Gmail.</p>
    </div>
    
    <div class="url">tryauren.in</div>
  </div>
  
  <div class="illustration-container">
    <img class="hero-illustration" src="auren_hero.webp" alt="Auren Mascot">
  </div>
</body>
</html>
